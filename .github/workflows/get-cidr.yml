name: Get CIDR List

on:
  schedule:
    # Запуск каждый понедельник в 03:00 UTC
    - cron: '0 3 * * 1'
  workflow_dispatch:  # Возможность ручного запуска

jobs:
  update-cidr:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Download and update CIDR file
        run: |
          mkdir -p src/IPs
          curl -L -o src/IPs/CIDR-ru.txt https://raw.githubusercontent.com/hydraponique/roscomvpn-geoip/refs/heads/master/release/text/direct.txt
          
          # Добавляем информацию о дате обновления
          echo "# Updated: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" > src/IPs/update_info.txt
          echo "# Source: https://github.com/hydraponique/roscomvpn-geoip" >> src/IPs/update_info.txt
          echo "# Total lines: $(wc -l < src/IPs/CIDR-ru.txt)" >> src/IPs/update_info.txt
      
      - name: Check if file has changed
        id: check
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "changes=true" >> $GITHUB_OUTPUT
            echo "Files changed"
          else
            echo "changes=false" >> $GITHUB_OUTPUT
            echo "No changes"
          fi
      
      - name: Commit and push changes
        if: steps.check.outputs.changes == 'true'
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add src/IPs/CIDR-ru.txt src/IPs/update_info.txt
          git commit -m "chore: update CIDR list from roscomvpn-geoip

          - Source: https://github.com/hydraponique/roscomvpn-geoip
          - Updated: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          git push
      
      - name: Log update status
        run: |
          echo "=========================================="
          echo "CIDR update completed"
          echo "File: src/IPs/CIDR-ru.txt"
          echo "Lines: $(wc -l < src/IPs/CIDR-ru.txt)"
          echo "=========================================="