name: Weekly Merge Whitelist

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

jobs:
  merge-whitelist:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout develop
        uses: actions/checkout@v4
        with:
          ref: develop

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run merged.py
        run: |
          cd tools
          python merged.py

      - name: Save whitelist artifact
        uses: actions/upload-artifact@v4
        with:
          name: whitelist
          path: release/whitelist.txt

      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Download whitelist artifact
        uses: actions/download-artifact@v4
        with:
          name: whitelist
          path: release

      - name: Commit to main
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          git add release/whitelist.txt

          if ! git diff --staged --quiet; then
            git commit -m "🤖 Auto-update: weekly whitelist merge"
            git push origin main
          else
            echo "No changes to commit"
          fi
