name: Weekly Merge Whitelist

on:
  schedule:
    # Запуск каждый понедельник в 00:00 UTC
    - cron: '0 0 * * 1'
  workflow_dispatch: # Позволяет запустить вручную через интерфейс GitHub

jobs:
  merge-whitelist:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: develop

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run merged.py script
        run: |
          cd tools
          python merged.py

      - name: Push changes to main branch
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Переключаемся на ветку main
          git fetch origin main
          git checkout main
          
          git add release/whitelist.txt || true
          if ! git diff --staged --quiet; then
            git commit -m "🤖 Auto-update: weekly whitelist merge"
            git push origin main
          else
            echo "No changes to commit"
          fi
